; PlatformIO Project Configuration File
; Firmware — Sistema de Alarmas Comunitarias / Botón de Pánico (COMSECA-Ambato)
; Arquitectura y entornos según skill firmware-esp32-platformio.

[platformio]
default_envs = esp32dev

; Opciones comunes a todos los entornos
[env]
build_flags = -std=gnu++17 -I include   ; include/ visible también para las libs (Config.h)
build_unflags = -std=gnu++11

; --- Hardware real (ESP32 DevKit V1 / WROOM-32) ---
[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = /dev/ttyUSB0
upload_speed = 115200          ; más lento pero fiable; sube a 460800 cuando el enlace sea estable
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6   ; Fase 2: audio por tipo de evento
; Fase 4 (SIM800L SMS): se usa AT crudo, sin lib externa.
; Fase 7 (GPRS/HTTP): aquí entrará vshymanskyy/TinyGSM.

; --- Tests de lógica pura en la PC (sin ESP32) ---
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -I include
