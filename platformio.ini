; PlatformIO Project Configuration File
; Firmware — Sistema de Alarmas Comunitarias / Botón de Pánico (COMSECA-Ambato)
; Arquitectura y entornos según skill firmware-esp32-platformio.

[platformio]
default_envs = esp32dev

; Opciones comunes a todos los entornos
[env]
build_flags = -std=gnu++17
build_unflags = -std=gnu++11

; --- Hardware real (ESP32 DevKit V1 / WROOM-32) ---
[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; lib_deps se irá poblando por fase:
;   Fase 2 -> dfrobot/DFRobotDFPlayerMini
;   Fase 4 -> vshymanskyy/TinyGSM

; --- Tests de lógica pura en la PC (sin ESP32) ---
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
